    <style>
        .search-container {
            max-width: 800px;
            margin: 150px auto 50px;
            padding: 0 20px;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .search-input {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: 2px solid rgba(201, 162, 39, 0.3);
            border-radius: 50px;
            background: rgba(22, 33, 62, 0.9);
            color: white;
            outline: none;
            transition: var(--transition);
        }
        
        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.2);
        }
        
        .search-btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(201, 162, 39, 0.4);
        }
        
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .result-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            animation: fadeInUp 0.6s ease both;
        }
        
        .result-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
        }
        
        .result-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .result-card-content {
            padding: 20px;
        }
        
        .result-card h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .result-card p {
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        
        .result-card a {
            display: inline-block;
            padding: 10px 25px;
            background: var(--primary-color);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .result-card a:hover {
            transform: scale(1.05);
        }
        
        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
        }
        
        .results-count {
            color: var(--text-muted);
            margin-bottom: 20px;
        }
    </style>
</head>

        // Combine all foods
        const allFoods = [...foods, ...additionalFoods];
        
        // Add more foods programmatically to reach 500
        for (let i = 251; i <= 500; i++) {
            const categories = ["Fast Food", "Yevropa", "Lotyn Amerika", "Yaponiya", "Koreya", "Mehnat Sharq", "Afrika", "Janubiy Afrika", "Avstraliya", "Shimoliy Afrika"];
            const category = categories[Math.floor(Math.random() * categories.length)];
            allFoods.push({
                id: i,
                name: `Taom ${i}`,
                category: category,
                description: `Mazali taom ${i}`,
                price: Math.floor(Math.random() * 50 + 10) * 1000 + ",000",
                image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400"
            });
        }
        
        function searchFood() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsContainer = document.getElementById('results');
            const resultsCount = document.getElementById('resultsCount');
            
            if (query.length < 1) {
                resultsContainer.innerHTML = '<p class="no-results">Iltimos, so\'z kiriting</p>';
                resultsCount.textContent = '';
                return;
            }
            
            const results = allFoods.filter(food => 
                food.name.toLowerCase().includes(query) ||
                food.category.toLowerCase().includes(query) ||
                food.description.toLowerCase().includes(query)
            );
            
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="no-results">Hech narsa topilmadi</p>';
                resultsCount.textContent = '';
                return;
            }
            
            resultsCount.textContent = `${results.length} ta taom topildi`;
            
            resultsContainer.innerHTML = results.map((food, index) => `
                <div class="result-card" style="animation-delay: ${index * 0.05}s" onclick="showFood(${food.id})">
                    <img src="${food.image}" alt="${food.name}">
                    <div class="result-card-content">
                        <h3>${food.name}</h3>
                        <p>${food.description}</p>
                        <p><strong>${food.price} so'm</strong></p>
                    </div>
                </div>
            `).join('');
        }
        
        function showFood(id) {
            alert(`Taom ID: ${id}\n\nBatafsil ma'lumot tez kunda qo'shiladi!`);
        }
        
        // Enter key search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchFood();
            }
        });
        
        // Load saved query
        window.addEventListener('load', function() {
            const query = localStorage.getItem('searchQuery');
            if (query) {
                document.getElementById('searchInput').value = query;
                localStorage.removeItem('searchQuery');
                searchFood();
            }
        });
    </script>
